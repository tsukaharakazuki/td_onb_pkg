## ======================================================================
## CAPI 汎用送信ワークフロー パラメータ設定
## ======================================================================
##
## [対応プラットフォーム]
##   facebook / yahoo / line / tiktok /
##   google_store_sales / google_enhanced_web /
##   pinterest / snapchat
##
## [カラム設定ルール]
##   カラムが存在しない場合は "" (空文字) を設定。
##   SQL側で "" の場合は NULL として出力される。
##
## [メアド設定]
##   has_email: true  → JS-SDK/購買データでメアドが取得できる
##   has_email: false → 会員IDをKeyに会員マスタからJOIN
##
## [JS-SDK有無]
##   js_enabled: true  → hourly + daily（補完）
##   js_enabled: false → dailyのみ（購買データのみ運用）
## ======================================================================

## ----- 共通設定 -----
common:
  database: capi_database               # 中間テーブル・ログの出力先DB
  currency: JPY                          # 通貨コード
  timezone: Asia/Tokyo

## ----- ブランド設定 -----
brand:

  ## ----------------------------------------------------------
  ## 設定例: Facebook CAPI（JS-SDKあり・メアドあり）
  ## ----------------------------------------------------------
  - brand_name: brand_a                  # ブランド識別子（テーブル名に使用）
    platform: facebook                   # 送信先プラットフォーム
    connector: brand_a_fb_capi           # TDコネクタ名

    ## --- データソース ---
    js_enabled: true
    log_db: brand_a_db
    log_tbl: pageviews
    purchase_db: brand_a_db
    purchase_tbl: purchases

    ## --- メアド設定 ---
    has_email: true
    member_db: ""                        # has_email:false のとき設定
    member_tbl: ""
    member_id_col: ""
    member_email_col: ""

    ## --- JS-SDK カラム名（"" → NULL） ---
    col_order_id: transactionid
    col_email: hashedmailaddress
    col_amount: amount
    col_member_id: userid
    col_phone: hashed_user_global_phone_number
    col_country: hashed_user_country
    col_user_agent: td_user_agent
    col_ip: td_ip
    col_url: td_path
    col_fbc: fbc                         # Facebook専用（他は ""）
    col_fbp: fbp                         # Facebook専用（他は ""）

    ## --- 購買データ カラム名 ---
    pcol_order_id: order_id
    pcol_email: email
    pcol_amount: amount
    pcol_member_id: member_id
    pcol_time: time

    ## --- フィルタ条件 ---
    cnv_conditions: "transactionid != '' AND transactionid NOT IN ('undefined')"
    purchase_conditions: "1=1"

    ## --- プラットフォーム固有設定（該当しないものは "" ）---
    yahoo_ydn_conv_io: ""                # Yahoo専用
    yahoo_ydn_conv_label: ""             # Yahoo専用
    google_conversion_action_id: ""      # Google専用

