## ======================================================================
## CAPI 送信ワークフロー パラメータ設定
## ======================================================================
##
## [構造]
##   common: 全PF共通のデータソース・カラム設定
##   brand:  PF別の送信先設定（コネクタ・コンバージョンID等）
##
## [共通ベースデータ]
##   全PFで必要なカラムを網羅した1つのテーブルを作成。
##   各PF送信時に push_*.sql でリネーム・フィルタして出力。
##   ないカラムは NULL として格納。
##
## [メアド設定]
##   js_has_email: true/false → Webログ(JS-SDK)にメアドがあるか
##   purchase_has_email: true/false → 購買ログにメアドがあるか
##   ※ それぞれ false の場合、会員マスタとJOINしてメアドを補完
##
## [ブランド設定]
##   同一PFで別コンバージョンIDに送信する場合は
##   ブランドを分けて個別に設定する。
##   ブランドごとにPF固有の設定のみを記載する。
## ======================================================================

## ----- 共通設定 -----
common:
  database: td_capi_universal
  currency: JPY
  timezone: Asia/Tokyo

  ## --- データソース ---
  js_enabled: true
  log_db: accesslogs
  log_tbl: td_pageviews
  purchase_db: ""
  purchase_tbl: ""

  ## --- メアド設定 ---
  js_has_email: true
  purchase_has_email: false
  email_hashed: false
  phone_hashed: false
  member_db: ""
  member_tbl: ""
  member_id_col: ""
  member_email_col: ""
  member_phone_col: ""

  ## --- JS-SDK カラム名 ---
  col_order_id: ""
  col_email: ""
  col_amount: ""
  col_member_id: ""
  col_phone: ""
  col_country: ""
  col_user_agent: td_user_agent
  col_ip: td_ip
  col_url: td_url
  col_fbc: ""
  col_fbp: ""

  ## --- 購買データ カラム名 ---
  pcol_order_id: ""
  pcol_email: ""
  pcol_amount: ""
  pcol_member_id: ""
  pcol_time: time

  ## --- フィルタ条件 ---
  cnv_conditions: "1=1"
  purchase_conditions: "1=1"

## ----- 送信先（ブランド）設定 -----
## 使用するPFのみコメントアウトを外して設定してください。
brand: []

